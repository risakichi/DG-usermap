
<style>

.tb { background:transparent; border:none; border-bottom:2px solid transparent; padding:8px 14px; font-size:12px; font-weight:500; color:var(--color-text-secondary); cursor:pointer; white-space:nowrap; }
.tb.on { color:var(--color-text-primary); border-bottom:2px solid var(--color-text-primary); }
.pnl { display:none; }
.pnl.on { display:block; }
.tip { position:absolute; display:none; background:var(--color-background-primary); border:0.5px solid var(--color-border-secondary); border-radius:var(--border-radius-md); padding:8px 12px; font-size:12px; color:var(--color-text-primary); max-width:220px; line-height:1.5; z-index:10; pointer-events:none; }
.legend { display:flex; flex-wrap:wrap; justify-content:center; gap:12px; padding:6px 0 2px; }
.leg-item { font-size:11px; color:var(--color-text-secondary); display:flex; align-items:center; gap:4px; }
.leg-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
.quad-label { font-size:10px; color:var(--color-text-secondary); display:flex; justify-content:space-between; padding:0 8px 2px; }
.list-hdr { display:grid; gap:8px; padding:6px 12px 4px; font-size:11px; color:var(--color-text-secondary); border-bottom:0.5px solid var(--color-border-tertiary); }
.p-row { display:grid; gap:8px; padding:9px 12px; border-bottom:0.5px solid var(--color-border-tertiary); font-size:12px; align-items:center; }
.p-row:last-child { border-bottom:none; }
.av { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:500; flex-shrink:0; }
.bar-wrap { width:100%; background:var(--color-background-secondary); border-radius:3px; height:3px; margin-top:3px; }
.bar { height:3px; border-radius:3px; }
.flt-row { display:flex; gap:6px; padding:10px 12px 6px; flex-wrap:wrap; }
.flt-btn { font-size:11px; padding:3px 10px; border-radius:20px; cursor:pointer; border:0.5px solid var(--color-border-secondary); background:transparent; color:var(--color-text-secondary); }
.flt-btn.sel { font-weight:500; }
</style>

<script>
const P = [
  { name:'るるん',      pts:40000,  tools:4, age:39, sex:'女', enjoy:3, strategy:3, bigCase:2, efficiency:3, note:'毎日ポイ活。比較サイト活用、キャンペーン狙い' },

  { name:'tomworkers',  pts:150000, tools:3, age:37, sex:'男', enjoy:3, strategy:4, bigCase:4, efficiency:4, note:'どこ得で比較。高単価案件に集中' },

  { name:'けんかりりの',pts:12000,  tools:3, age:30, sex:'女', enjoy:2, strategy:3, bigCase:1, efficiency:3, note:'複数サイト比較してから購入' },
  { name:'アキらんくん',pts:150000, tools:7, age:51, sex:'男', enjoy:3, strategy:4, bigCase:3, efficiency:4, note:'アクション前に必ずポイントサイト経由' },
  { name:'ひつじん',    pts:145684, tools:4, age:47, sex:'男', enjoy:2, strategy:5, bigCase:3, efficiency:5, note:'取りこぼしゼロ設計。否認条件スクショ保存' },
  { name:'ムカゴ',      pts:2000,   tools:7, age:45, sex:'女', enjoy:2, strategy:2, bigCase:1, efficiency:2, note:'チリツモ重視。確実に経由' },
  { name:'ぽんぽこたろう',pts:1201, tools:5, age:31, sex:'男', enjoy:2, strategy:3, bigCase:3, efficiency:3, note:'カード・口座開設案件に積極参加' },
  { name:'ひのもと',    pts:5000,   tools:5, age:43, sex:'女', enjoy:2, strategy:2, bigCase:1, efficiency:2, note:'期間限定ポイントアップを活用' },
  { name:'エイシュン',  pts:1500,   tools:3, age:41, sex:'男', enjoy:2, strategy:2, bigCase:1, efficiency:1, note:'隙間時間でアンケート。座談会案件注力' },
  { name:'スダ',        pts:9000,   tools:8, age:33, sex:'女', enjoy:3, strategy:3, bigCase:2, efficiency:3, note:'SNS情報収集。カード発行タイミングを見計らう' },
  { name:'ホウネン',    pts:1500,   tools:7, age:47, sex:'男', enjoy:2, strategy:2, bigCase:2, efficiency:2, note:'ネット購入・高額案件を常にチェック' },
  { name:'pon',         pts:17500,  tools:5, age:37, sex:'男', enjoy:2, strategy:2, bigCase:1, efficiency:2, note:'買い物は基本的にポイントサイト経由' },
  { name:'てりり',      pts:10000,  tools:1, age:47, sex:'女', enjoy:2, strategy:2, bigCase:1, efficiency:2, note:'高還元決済（バーコード）に集中' },
  { name:'ウラノ',      pts:3000,   tools:4, age:57, sex:'女', enjoy:1, strategy:1, bigCase:1, efficiency:1, note:'毎日コツコツ' },
  { name:'Magenta',     pts:3000,   tools:9, age:47, sex:'女', enjoy:3, strategy:3, bigCase:1, efficiency:2, note:'アンケート・レシ活・移動距離まで幅広く活用' },
  { name:'ここみや',    pts:30000,  tools:4, age:38, sex:'女', enjoy:3, strategy:2, bigCase:3, efficiency:2, note:'ゲーム課金時もキャッシュバック活用' },
  { name:'ケロン',      pts:100000, tools:5, age:28, sex:'男', enjoy:3, strategy:4, bigCase:3, efficiency:4, note:'ポイントサイト間を比較し最良ルートを経由' },
  { name:'hsakr',       pts:2500,   tools:3, age:46, sex:'男', enjoy:2, strategy:2, bigCase:1, efficiency:2, note:'ポイントアップ時期を狙って利用' },
  { name:'ペヨン',      pts:29000,  tools:5, age:32, sex:'男', enjoy:2, strategy:3, bigCase:3, efficiency:3, note:'カード・アプリ申込は公式と二重取り' },
  { name:'はせあや',    pts:12500,  tools:6, age:36, sex:'女', enjoy:2, strategy:2, bigCase:2, efficiency:2, note:'ポイントを使いさらにポイント還元を狙う' },
  { name:'キノシタユ',  pts:45000,  tools:3, age:30, sex:'男', enjoy:2, strategy:5, bigCase:3, efficiency:5, note:'ウエル活で実質33%オフ。出口戦略まで設計' },
];

const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const gc = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
const tc = isDark ? '#B4B2A9' : '#5F5E5A';
const lc = isDark ? 'rgba(255,255,255,0.18)' : 'rgba(0,0,0,0.13)';

const axes = [
  {
    xKey:'tools', yKey:'pts',
    xLabel:'ツール・モール数', yLabel:'獲得ポイント量',
    xMin:0, xMax:10, yMin:0, yMax:160000,
    xMid:5, yMid:20000,
    xFmt: v => v,
    yFmt: v => v>=10000 ? (v/10000).toFixed(0)+'万' : v,
    color: p => {
      const h=p.pts>=20000, t=p.tools>=5;
      return h&&t?'#1D9E75': h&&!t?'#D85A30': !h&&t?'#378ADD':'#888780';
    },
    qLabels: [
      {x:8.5,y:145000,txt:'戦略的ガチ勢',c:'#1D9E75'},
      {x:2,y:145000,txt:'集中型',c:'#D85A30'},
      {x:8.5,y:8000,txt:'探索型',c:'#378ADD'},
      {x:2,y:8000,txt:'コツコツ型',c:'#888780'},
    ]
  },
  {
    xKey:'age', yKey:'pts',
    xLabel:'年齢', yLabel:'獲得ポイント量',
    xMin:25, xMax:62, yMin:0, yMax:160000,
    xMid:43, yMid:20000,
    xFmt: v => v+'歳',
    yFmt: v => v>=10000 ? (v/10000).toFixed(0)+'万' : v,
    color: p => {
      const young=p.age<43, h=p.pts>=20000;
      return young&&h?'#7F77DD': young&&!h?'#D4537E': !young&&h?'#1D9E75':'#888780';
    },
    qLabels: [
      {x:59,y:145000,txt:'中高年×高成果',c:'#1D9E75'},
      {x:29,y:145000,txt:'若×高成果',c:'#7F77DD'},
      {x:59,y:8000,txt:'中高年×低成果',c:'#888780'},
      {x:29,y:8000,txt:'若×低成果',c:'#D4537E'},
    ]
  },
  {
    xKey:'enjoy', yKey:'strategy',
    xLabel:'楽しさ・ゲーム感覚スコア', yLabel:'戦略性スコア',
    xMin:0.5, xMax:5.5, yMin:0.5, yMax:5.5,
    xMid:2.5, yMid:2.5,
    xFmt: v => v,
    yFmt: v => v,
    color: p => {
      const hs=p.strategy>=2.5, he=p.enjoy>=2.5;
      return hs&&he?'#1D9E75': hs&&!he?'#D85A30': !hs&&he?'#378ADD':'#888780';
    },
    qLabels: [
      {x:4.5,y:5,txt:'楽しみながら戦略的',c:'#1D9E75'},
      {x:1.5,y:5,txt:'実利重視・ストイック',c:'#D85A30'},
      {x:4.5,y:1.5,txt:'楽しみ重視・ゆる',c:'#378ADD'},
      {x:1.5,y:1.5,txt:'ゆるコツコツ',c:'#888780'},
    ]
  },
  {
    xKey:'efficiency', yKey:'bigCase',
    xLabel:'効率重視・比較行動スコア', yLabel:'高額案件への積極性',
    xMin:0.5, xMax:5.5, yMin:0.5, yMax:4.5,
    xMid:2.5, yMid:2,
    xFmt: v => v,
    yFmt: v => v,
    color: p => {
      const hb=p.bigCase>=2, he=p.efficiency>=2.5;
      return hb&&he?'#1D9E75': hb&&!he?'#EF9F27': !hb&&he?'#378ADD':'#888780';
    },
    qLabels: [
      {x:4.5,y:4,txt:'攻めの最適化型',c:'#1D9E75'},
      {x:1.5,y:4,txt:'大型案件・直感型',c:'#EF9F27'},
      {x:4.5,y:1.2,txt:'小額・高効率型',c:'#378ADD'},
      {x:1.5,y:1.2,txt:'小額・直感型',c:'#888780'},
    ]
  }
];

const charts = [];
function makeChart(idx, ax) {
  const cid = 'c'+idx, tid = 't'+idx;
  const wrap = document.getElementById(cid).parentElement;
  wrap.style.height = '360px';
  const ds = P.map(p => ({
    label:p.name,
    data:[{x:p[ax.xKey], y:p[ax.yKey], p}],
    backgroundColor: ax.color(p),
    pointRadius:7, pointHoverRadius:9
  }));
  const annots = {};
  annots.vl = {type:'line',xMin:ax.xMid,xMax:ax.xMid,borderColor:lc,borderWidth:1.5,borderDash:[4,4]};
  annots.hl = {type:'line',yMin:ax.yMid,yMax:ax.yMid,borderColor:lc,borderWidth:1.5,borderDash:[4,4]};
  ax.qLabels.forEach((q,i) => {
    annots['q'+i]={type:'label',xValue:q.x,yValue:q.y,content:[q.txt],color:q.c,font:{size:10,weight:'500'},textAlign:'center'};
  });
  const ch = new Chart(document.getElementById(cid), {
    type:'scatter', data:{datasets:ds},
    options:{
      responsive:true, maintainAspectRatio:false,
      layout:{padding:{top:16,bottom:8,left:8,right:16}},
      scales:{
        x:{min:ax.xMin,max:ax.xMax,title:{display:true,text:ax.xLabel,color:tc,font:{size:11}},grid:{color:gc},ticks:{color:tc,font:{size:10},callback:ax.xFmt}},
        y:{min:ax.yMin,max:ax.yMax,title:{display:true,text:ax.yLabel,color:tc,font:{size:11}},grid:{color:gc},ticks:{color:tc,font:{size:10},callback:ax.yFmt}}
      },
      plugins:{
        legend:{display:false},
        annotation:{annotations:annots},
        tooltip:{enabled:false,external:({chart,tooltip})=>{
          const el=document.getElementById(tid);
          if(!tooltip||tooltip.opacity===0){el.style.display='none';return;}
          const d=tooltip.dataPoints?.[0]?.raw?.p;
          if(!d)return;
          el.innerHTML=`<strong>${d.name}</strong>（${d.age}歳・${d.sex}）<br>獲得：${d.pts.toLocaleString()}pt　ツール：${d.tools}種<br><span style="color:var(--color-text-secondary);font-size:11px;">${d.note}</span>`;
          el.style.display='block';
          el.style.left=(tooltip.caretX+12)+'px';
          el.style.top=tooltip.caretY+'px';
        }}
      }
    }
  });
  charts.push(ch);
}

axes.forEach((ax,i) => makeChart(i, ax));

const quadDefs = [
  {key:'all', label:'全員', color:'var(--color-text-secondary)', bg:'var(--color-background-secondary)', border:'var(--color-border-secondary)'},
  {key:'q1', label:'高成果×高戦略', color:'#085041', bg:'#E1F5EE', border:'#1D9E75'},
  {key:'q2', label:'高成果×シンプル', color:'#712B13', bg:'#FAECE7', border:'#D85A30'},
  {key:'q3', label:'低成果×高戦略', color:'#0C447C', bg:'#E6F1FB', border:'#378ADD'},
  {key:'q4', label:'低成果×シンプル', color:'#444441', bg:'#F1EFE8', border:'#888780'},
];
function getQ(p){
  const h=p.pts>=20000,t=p.tools>=5;
  return h&&t?'q1':h&&!t?'q2':!h&&t?'q3':'q4';
}
P.forEach(p=>p.quadKey=getQ(p));

const qColor = {'q1':'#1D9E75','q2':'#D85A30','q3':'#378ADD','q4':'#888780'};
const qBg = {'q1':'#E1F5EE','q2':'#FAECE7','q3':'#E6F1FB','q4':'#F1EFE8'};
const qTc = {'q1':'#085041','q2':'#712B13','q3':'#0C447C','q4':'#444441'};

let curFlt='all';
const fltRow = document.getElementById('flt-row');
quadDefs.forEach(q => {
  const b = document.createElement('button');
  b.className='flt-btn' + (q.key==='all'?' sel':'');
  b.id='fb-'+q.key;
  b.textContent=q.label;
  b.style.borderColor=q.border; b.style.color=q.color; b.style.background=(q.key==='all'?'var(--color-background-secondary)':q.bg);
  b.onclick=()=>{ curFlt=q.key; renderList(); document.querySelectorAll('.flt-btn').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); };
  fltRow.appendChild(b);
});

function renderList(){
  const body = document.getElementById('list-body');
  const filtered = curFlt==='all' ? P : P.filter(p=>p.quadKey===curFlt);
  const sorted = [...filtered].sort((a,b)=>b.pts-a.pts);
  body.innerHTML = sorted.map(p=>{
    const c=qColor[p.quadKey], bg=qBg[p.quadKey], t=qTc[p.quadKey];
    const pct=Math.round(p.pts/150000*100);
    return `<div class="p-row" style="grid-template-columns:26px minmax(0,1fr) 70px 55px 55px;">
      <div class="av" style="background:${bg};color:${t};">${p.name.slice(0,2)}</div>
      <div style="min-width:0;">
        <div style="font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
        <div style="font-size:11px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.note}</div>
        <div class="bar-wrap"><div class="bar" style="width:${pct}%;background:${c};"></div></div>
      </div>
      <div style="text-align:right;"><span style="font-weight:500;color:var(--color-text-primary);">${p.pts>=10000?(p.pts/10000).toFixed(1)+'万':p.pts.toLocaleString()}</span><div style="font-size:10px;color:var(--color-text-secondary);">pt</div></div>
      <div style="text-align:right;"><span style="font-weight:500;color:var(--color-text-primary);">${p.age}</span><div style="font-size:10px;color:var(--color-text-secondary);">歳</div></div>
      <div style="text-align:right;"><span style="font-weight:500;color:var(--color-text-primary);">${p.tools}</span><div style="font-size:10px;color:var(--color-text-secondary);">種</div></div>
    </div>`;
  }).join('');
}
renderList();

let curTab=0;
function sw(i){
  curTab=i;
  document.querySelectorAll('.tb').forEach((b,j)=>b.classList.toggle('on',j===i));
  document.querySelectorAll('.pnl').forEach((p,j)=>p.classList.toggle('on',j===i));
  if(i<4) setTimeout(()=>charts[i]?.resize(),50);
}
</script>
